{% load static %}
<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>Deleted Tasks</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/css/index.css' %}">
  </head>
  <body>
    <h1>Deleted Tasks</h1>
    <p>Select deleted tasks and restore them.</p>
    <form action="{% url 'restore_deleted_tasks' %}" method="post">
      {% csrf_token %}
      {% if deleted_tasks %}
      <ul>
        {% for task in deleted_tasks %}
        <li>
          <label>
            <input type="checkbox" name="task_ids" value="{{ task.id }}">
            {{ task.title }} (deleted at: {{ task.deleted_at }})
          </label>
        </li>
        {% endfor %}
      </ul>
      <button type="submit">Restore Selected</button>
      {% else %}
      <p>No deleted tasks.</p>
      {% endif %}
    </form>
    <div>
      <a href="{% url 'index' %}">Back to Top</a>
    </div>
  </body>
</html>
